# AccessFlow Render Blueprint
# Current Render Blueprint spec:
# - Static sites use type: web with runtime: static.
# - Docker-backed Spring Boot services use type: web with runtime: docker.
# - autoDeployTrigger replaces the older autoDeploy field.
version: "1"

# Preview environments stay off for free-tier friendliness. Enable manually if needed.
previews:
  generation: off

services:
  # Backend: Spring Boot API, built from backend/Dockerfile with Java 21.
  - type: web
    runtime: docker
    name: accessflow-api
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: sh -c 'java $JAVA_OPTS -jar /app/app.jar'
    healthCheckPath: /api/v1/health/ready
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 60
    buildFilter:
      paths:
        - backend/**
        - render.yaml
      ignoredPaths:
        - frontend/**
        - README.md
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
      - key: BACKEND_PUBLIC_URL
        value: https://accessflow-api.onrender.com
      - key: FRONTEND_PUBLIC_URL
        value: https://accessflow-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://accessflow-web.onrender.com

      # Required production secrets and credentials. Render prompts for these
      # during first Blueprint creation and preserves existing values on sync.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_NAME
        sync: false
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

      # Non-secret production defaults.
      - key: JWT_ISSUER
        value: visitor-management
      - key: JWT_EXPIRATION_MINUTES
        value: 60
      - key: JWT_REFRESH_EXPIRATION_DAYS
        value: 7
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: 180
      - key: CLOUDINARY_FOLDER
        value: visitor-management
      - key: SENDGRID_ENABLED
        value: "true"
      - key: SENDGRID_FROM_NAME
        value: AccessFlow Security
      - key: SWAGGER_UI_ENABLED
        value: "false"

  # Frontend: pure static HTML/CSS/JavaScript served by Render's CDN.
  - type: web
    runtime: static
    name: accessflow-web
    autoDeployTrigger: commit
    staticPublishPath: ./frontend
    buildCommand: |
      test -n "$API_BASE_URL"
      printf 'window.API_BASE_URL = "%s";\nwindow.VISITOR_API_BASE_URL = window.API_BASE_URL;\n' "$API_BASE_URL" > frontend/assets/js/env.js
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
      ignoredPaths:
        - backend/**
        - README.md
    headers:
      - path: /assets/js/env.js
        name: Cache-Control
        value: no-store
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /js/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: API_BASE_URL
        value: https://accessflow-api.onrender.com/api/v1
      - key: FRONTEND_PUBLIC_URL
        value: https://accessflow-web.onrender.com
