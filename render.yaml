services:
  - type: web
    name: accessflow-api
    env: java
    plan: free
    rootDir: backend
    autoDeploy: true
    buildCommand: chmod +x ./mvnw && ./mvnw -B clean package -DskipTests
    startCommand: java -XX:MaxRAMPercentage=75 -XX:+UseG1GC -jar target/visitor-management-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: SUPER_ADMIN_NAME
        sync: false
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: visitor-management
      - key: JWT_EXPIRATION_MINUTES
        value: 60
      - key: JWT_REFRESH_EXPIRATION_DAYS
        value: 7
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_REQUESTS_PER_MINUTE
        value: 180
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: visitor-management
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SENDGRID_ENABLED
        value: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: AccessFlow Security
      - key: SWAGGER_UI_ENABLED
        value: false

  - type: static
    name: accessflow-web
    rootDir: frontend
    autoDeploy: true
    buildCommand: test -n "$API_BASE_URL" && printf 'window.API_BASE_URL = "%s";\nwindow.VISITOR_API_BASE_URL = window.API_BASE_URL;\n' "$API_BASE_URL" > assets/js/env.js
    staticPublishPath: .
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_PUBLIC_URL
        sync: false
