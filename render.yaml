version: "1"

previews:
  generation: off

services:
  - type: web
    name: accessflow-api
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://accessflow-web.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false

  - type: web
    name: accessflow-web
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    buildCommand: |
      test -n "$API_BASE_URL"
      printf 'window.API_BASE_URL = "%s";\n' "$API_BASE_URL" > assets/js/env.js
    headers:
      - path: /assets/js/env.js
        name: Cache-Control
        value: no-store
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /js/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /auth
        destination: /index.html
      - type: rewrite
        source: /login
        destination: /index.html
      - type: rewrite
        source: /admin
        destination: /pages/admin/index.html
      - type: rewrite
        source: /admin/*
        destination: /pages/admin/index.html
      - type: rewrite
        source: /employee
        destination: /pages/employee/index.html
      - type: rewrite
        source: /employee/*
        destination: /pages/employee/index.html
      - type: rewrite
        source: /security
        destination: /pages/security/index.html
      - type: rewrite
        source: /security/*
        destination: /pages/security/index.html
      - type: rewrite
        source: /forgot-password
        destination: /pages/forgot-password/index.html
      - type: rewrite
        source: /verify-otp
        destination: /pages/verify-otp/index.html
      - type: rewrite
        source: /reset-password
        destination: /pages/reset-password/index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        value: https://accessflow-api.onrender.com/api/v1
