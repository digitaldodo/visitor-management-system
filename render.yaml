services:
  - type: web
    name: visitor-management-api
    env: java
    plan: free
    rootDir: backend
    buildCommand: bash ./mvnw -B clean package -DskipTests
    startCommand: java -jar target/visitor-management-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: visitor-management
      - key: JWT_EXPIRATION_MINUTES
        value: 60
      - key: JWT_REFRESH_EXPIRATION_DAYS
        value: 7
      - key: APP_SEED_TEST_ACCOUNTS
        value: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_FOLDER
        value: visitor-management
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SENDGRID_ENABLED
        value: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: AccessFlow Security

  - type: static
    name: visitor-management-web
    rootDir: frontend
    buildCommand: printf 'window.VISITOR_API_BASE_URL = "%s";\n' "$VISITOR_API_BASE_URL" > assets/js/env.js
    staticPublishPath: .
    envVars:
      - key: VISITOR_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
