version: "1"

previews:
  generation: off

services:
  - type: web
    name: accessflow-api-goww
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_PUBLIC_URL
        value: https://accessflow-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://accessflow-web.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false

  - type: web
    name: accessflow-web
    runtime: static
    rootDir: frontend
    staticPublishPath: dist
    buildCommand: |
      test -n "$API_BASE_URL"
      node ./scripts/build-static.mjs
    headers:
      - path: /
        name: Cache-Control
        value: no-store
      - path: /index.html
        name: Cache-Control
        value: no-store
      - path: /pages/*
        name: Cache-Control
        value: no-store
      - path: /pages/**/*
        name: Cache-Control
        value: no-store
      - path: /auth
        name: Cache-Control
        value: no-store
      - path: /login
        name: Cache-Control
        value: no-store
      - path: /admin
        name: Cache-Control
        value: no-store
      - path: /admin/*
        name: Cache-Control
        value: no-store
      - path: /employee
        name: Cache-Control
        value: no-store
      - path: /employee/*
        name: Cache-Control
        value: no-store
      - path: /security
        name: Cache-Control
        value: no-store
      - path: /security/*
        name: Cache-Control
        value: no-store
      - path: /forgot-password
        name: Cache-Control
        value: no-store
      - path: /verify-otp
        name: Cache-Control
        value: no-store
      - path: /verify-email
        name: Cache-Control
        value: no-store
      - path: /pass/*
        name: Cache-Control
        value: no-store
      - path: /verify/*
        name: Cache-Control
        value: no-store
      - path: /reset-password
        name: Cache-Control
        value: no-store
      - path: /assets/app-manifest.json
        name: Cache-Control
        value: no-store
      - path: /assets/js/env.js
        name: Cache-Control
        value: no-store
      - path: /assets/js/boot.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /js/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /auth
        destination: /index.html
      - type: rewrite
        source: /login
        destination: /index.html
      - type: rewrite
        source: /admin
        destination: /pages/admin/index.html
      - type: rewrite
        source: /admin/*
        destination: /pages/admin/index.html
      - type: rewrite
        source: /employee
        destination: /pages/employee/index.html
      - type: rewrite
        source: /employee/*
        destination: /pages/employee/index.html
      - type: rewrite
        source: /security
        destination: /pages/security/index.html
      - type: rewrite
        source: /security/*
        destination: /pages/security/index.html
      - type: rewrite
        source: /forgot-password
        destination: /pages/forgot-password/index.html
      - type: rewrite
        source: /verify-otp
        destination: /pages/verify-otp/index.html
      - type: rewrite
        source: /verify-email
        destination: /pages/verify-email/index.html
      - type: rewrite
        source: /pass/*
        destination: /pages/pass/index.html
      - type: rewrite
        source: /verify/*
        destination: /pages/pass/index.html
      - type: rewrite
        source: /reset-password
        destination: /pages/reset-password/index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        value: https://accessflow-api-goww.onrender.com/api/v1
