server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: visitor-management-backend
  profiles:
    default: local
  cache:
    type: simple
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/visitor_management}
      auto-index-creation: false
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500}
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-change-me-32}
    issuer: visitor-management
    expiration-minutes: 60
    refresh-expiration-days: 7
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: visitor-management
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:}
    from-name: AccessFlow Security
  visitors:
    max-active-per-employee: 10
    pending-approval-ttl-minutes: 240
    expiry-sweep-delay-ms: 60000
  notifications:
    email-retry-delay-ms: 120000
  rate-limit:
    enabled: true
    requests-per-minute: 180

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

info:
  app:
    name: AccessFlow Visitor Management
    version: 1.0.0

logging:
  level:
    root: INFO
    com.visitor.management: INFO
    org.mongodb.driver.cluster: WARN
