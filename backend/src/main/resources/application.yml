server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: visitor-management-backend
  profiles:
    default: local
  cache:
    type: simple
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/visitor_management}
      auto-index-creation: false
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500}
  jwt:
    secret: ${JWT_SECRET:local-development-secret-key-change-me-32}
    issuer: ${JWT_ISSUER:visitor-management}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  cloudinary:
    url: ${CLOUDINARY_URL:}
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:visitor-management}
  sendgrid:
    enabled: ${SENDGRID_ENABLED:true}
    api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:}
    from-name: ${SENDGRID_FROM_NAME:AccessFlow Security}
    api-base-url: ${SENDGRID_API_BASE_URL:https://api.sendgrid.com}
  seed:
    test-accounts: ${APP_SEED_TEST_ACCOUNTS:false}
  visitors:
    max-active-per-employee: ${VISITOR_MAX_ACTIVE_PER_EMPLOYEE:10}
    pending-approval-ttl-minutes: ${VISITOR_PENDING_APPROVAL_TTL_MINUTES:240}
    expiry-sweep-delay-ms: ${VISITOR_EXPIRY_SWEEP_DELAY_MS:60000}
  notifications:
    email-retry-delay-ms: ${NOTIFICATION_EMAIL_RETRY_DELAY_MS:120000}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:180}
  backup:
    strategy: ${BACKUP_STRATEGY:mongodb-atlas-scheduled-snapshots}
    retention: ${BACKUP_RETENTION:managed-by-provider}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

info:
  app:
    name: AccessFlow Visitor Management
    version: 1.0.0

logging:
  level:
    root: INFO
    com.visitor.management: INFO
    org.mongodb.driver.cluster: WARN
