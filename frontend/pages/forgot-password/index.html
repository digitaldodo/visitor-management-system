<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AccessFlow password recovery." />
    <title>AccessFlow | Forgot Password</title>
    <link rel="icon" href="../../assets/branding/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="../../css/shared/auth.css?v=20260511-prod" />
  </head>
  <body>
    <main class="auth-layout auth-layout--compact">
      <section class="auth-copy" aria-label="AccessFlow security">
        <div class="auth-copy__inner">
          <a class="auth-copy__brand logo-link" href="../../index.html" aria-label="AccessFlow home">
            <img class="brand-logo brand-logo--full brand-logo--light" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
          </a>
          <div class="auth-copy__headline">
            <p class="eyebrow">Account recovery</p>
            <h1>Get back in safely.</h1>
            <p>We will help you restore access with a protected verification step.</p>
          </div>
        </div>
      </section>

      <section class="auth-card" aria-label="Forgot password">
        <form class="auth-form" id="forgot-password-form" novalidate>
          <div class="auth-form__header">
            <p class="eyebrow">Account recovery</p>
            <h2>Forgot password</h2>
            <p>Enter your account details and we will send a protected verification code.</p>
          </div>
          <label class="form-field">
            <span>Username or email</span>
            <input name="identifier" type="text" autocomplete="username" placeholder="username or email@company.com" required />
          </label>
          <button class="button button--primary auth-submit" type="submit">Send code</button>
          <a class="link-button link-button--anchor" href="../../index.html">Back to sign in</a>
        </form>
        <footer class="auth-footer">AccessFlow · Account recovery</footer>
      </section>
    </main>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <script src="../../assets/js/env.js"></script>
    <script type="module" src="../../js/passwordReset.js?v=20260511-prod"></script>
  </body>
</html>
