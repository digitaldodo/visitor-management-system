<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AccessFlow password reset." />
    <title>AccessFlow | Reset Password</title>
    <link rel="icon" href="../../assets/branding/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="../../css/shared/auth.css?v=20260511" />
  </head>
  <body>
    <main class="auth-layout auth-layout--compact">
      <section class="auth-copy" aria-label="AccessFlow security">
        <div class="auth-copy__inner">
          <a class="auth-copy__brand logo-link" href="../../index.html" aria-label="AccessFlow home">
            <img class="brand-logo brand-logo--full brand-logo--light" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
          </a>
          <div class="auth-copy__headline">
            <p class="eyebrow">Account recovery</p>
            <h1>Create a new password.</h1>
            <p>Choose a strong password and continue with protected account access.</p>
          </div>
        </div>
      </section>

      <section class="auth-card" aria-label="Reset password">
        <form class="auth-form" id="reset-password-form" novalidate>
          <div>
            <p class="eyebrow">Account recovery</p>
            <h2>Reset password</h2>
          </div>
          <label class="form-field form-field--password">
            <span>New password</span>
            <input name="newPassword" type="password" autocomplete="new-password" placeholder="12+ characters" required />
            <button class="password-toggle" type="button" aria-label="Show password">Show</button>
          </label>
          <div class="password-strength" aria-live="polite">
            <span class="password-strength__bar"><span id="password-strength-bar"></span></span>
            <span id="password-strength-label">Strength: weak</span>
          </div>
          <label class="form-field form-field--password">
            <span>Confirm password</span>
            <input name="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat password" required />
            <button class="password-toggle" type="button" aria-label="Show password">Show</button>
          </label>
          <button class="button button--primary auth-submit" type="submit">Update password</button>
          <a class="link-button link-button--anchor" href="../../index.html">Back to sign in</a>
        </form>
        <footer class="auth-footer">AccessFlow · Password reset</footer>
      </section>
    </main>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <script src="../../assets/js/env.js"></script>
    <script type="module" src="../../js/passwordReset.js?v=20260511"></script>
  </body>
</html>
