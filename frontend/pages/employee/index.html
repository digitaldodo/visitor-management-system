<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AccessFlow employee portal" />
    <title>AccessFlow | Employee Portal</title>
    <link rel="icon" href="../../assets/branding/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="../../css/employee/employee.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="portal-shell employee-shell" data-sidebar-state="expanded">
      <aside class="sidebar" aria-label="Employee navigation">
        <a class="brand logo-link" href="/employee/dashboard" aria-label="Employee portal home">
          <img class="brand-logo brand-logo--full brand-logo--light" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
          <img class="brand-logo brand-logo--icon" src="../../assets/branding/logo-icon.png" alt="AccessFlow" />
        </a>
        <button class="icon-button sidebar__collapse" id="sidebar-collapse" type="button" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 8 12l7 7 1.4-1.4L10.8 12l5.6-5.6Z"/></svg>
        </button>
        <p class="sidebar__tagline">Smart. Secure. Seamless Visitor Management.</p>

        <nav class="nav-list" id="sidebar-nav">
          <a class="nav-link is-active" href="/employee/dashboard" data-route="dashboard">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 11 12 3l9 8v10h-6v-6H9v6H3Z"/></svg></span>
            Dashboard
          </a>
          <a class="nav-link" href="/employee/badge" data-route="badge">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 2h10v4h3v16H4V6h3Zm2 4h6V4H9Zm3 8a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm-5 5h10a5 5 0 0 0-10 0Z"/></svg></span>
            Badge
          </a>
          <a class="nav-link" href="/employee/presence" data-route="presence">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h16v2H4Zm0 4h16v10H4Zm3 3v4h3v-4Zm5 0v4h5v-4Z"/></svg></span>
            Presence
          </a>
          <a class="nav-link" href="/employee/requests" data-route="requests">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3v18H4V4h3Zm11 8H6v10h12Z"/></svg></span>
            Requests
          </a>
          <a class="nav-link" href="/employee/history" data-route="history">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10h-2a8 8 0 1 1-2.3-5.7L15 9h7V2l-2.8 2.8A10 10 0 0 0 12 2Zm1 5h-2v6l5 3 1-1.7-4-2.3Z"/></svg></span>
            History
          </a>
          <a class="nav-link" href="/employee/notifications" data-route="notifications">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 22a2.4 2.4 0 0 0 2.3-1.8H9.7A2.4 2.4 0 0 0 12 22Zm7-5-2-2v-4a5 5 0 0 0-10 0v4l-2 2v1h14Z"/></svg></span>
            Notifications
          </a>
          <a class="nav-link" href="/employee/profile" data-route="profile">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm-9 9a9 9 0 0 1 18 0Z"/></svg></span>
            Profile
          </a>
          <a class="nav-link" href="/employee/settings" data-route="settings">
            <span class="nav-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m19.4 13.5.1-1.5-.1-1.5 2-1.6-2-3.5-2.5 1a7 7 0 0 0-2.6-1.5L14 2h-4l-.4 2.9A7 7 0 0 0 7 6.4l-2.5-1-2 3.5 2 1.6L4.4 12l.1 1.5-2 1.6 2 3.5 2.5-1a7 7 0 0 0 2.6 1.5L10 22h4l.4-2.9a7 7 0 0 0 2.6-1.5l2.5 1 2-3.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg></span>
            Settings
          </a>
        </nav>

        <div class="sidebar__footer">
          <div class="sidebar__status">
            <span class="status-dot" id="api-status-dot" aria-hidden="true"></span>
            <span id="api-status-text">API checking</span>
          </div>
          <span class="sidebar__product">AccessFlow workflow hub</span>
        </div>
      </aside>

      <div class="shell-content">
        <header class="topbar">
          <button class="icon-button topbar__menu" id="sidebar-toggle" type="button" aria-label="Open navigation">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4Zm0 5h16v2H4Zm0 5h16v2H4Z"/></svg>
          </button>
          <a class="topbar__brand logo-link" href="/employee/dashboard" aria-label="Employee dashboard home">
            <img class="brand-logo brand-logo--full brand-logo--dark" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
            <img class="brand-logo brand-logo--icon" src="../../assets/branding/logo-icon.png" alt="AccessFlow" />
          </a>
          <div class="topbar__title">
            <p class="eyebrow">Workflow Workspace</p>
            <h1>Employee Dashboard</h1>
            <p class="topbar__tagline">Smart. Secure. Seamless Visitor Management.</p>
          </div>
          <div class="topbar__actions">
            <span class="user-chip" id="user-chip">Signed in</span>
            <button class="button button--ghost" id="refresh-health" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.8-4.2L13 11h8V3Z"/></svg>
              <span>Refresh</span>
            </button>
            <button class="icon-button" id="logout-button" type="button" aria-label="Logout">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h8v2H7v14h6v2H5Zm10.6 4.4L20.2 12l-4.6 4.6-1.4-1.4 2.2-2.2H10v-2h6.4l-2.2-2.2Z"/></svg>
            </button>
          </div>
        </header>

        <main class="portal-main employee-page-host" id="main-content" tabindex="-1" aria-live="polite"></main>
      </div>
    </div>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <div class="backdrop" id="sidebar-backdrop"></div>
    <script src="../../assets/js/env.js"></script>
    <script src="../../assets/js/boot.js"></script>
    <script type="module" src="../../js/employee/dashboard.js"></script>
  </body>
</html>
