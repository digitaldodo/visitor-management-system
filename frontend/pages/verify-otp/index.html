<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AccessFlow OTP verification." />
    <title>AccessFlow | Verify OTP</title>
    <link rel="icon" href="../../assets/branding/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="../../css/shared/auth.css?v=20260511" />
  </head>
  <body>
    <main class="auth-layout auth-layout--compact">
      <section class="auth-copy" aria-label="AccessFlow security">
        <div class="auth-copy__inner">
          <a class="auth-copy__brand logo-link" href="../../index.html" aria-label="AccessFlow home">
            <img class="brand-logo brand-logo--full brand-logo--light" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
          </a>
          <div class="auth-copy__headline">
            <p class="eyebrow">Account recovery</p>
            <h1>Verify your identity.</h1>
            <p>One-time verification for password recovery.</p>
          </div>
        </div>
      </section>

      <section class="auth-card" aria-label="OTP verification">
        <form class="auth-form" id="verify-otp-form" novalidate>
          <div>
            <p class="eyebrow">Account recovery</p>
            <h2>Verify OTP</h2>
          </div>
          <label class="form-field">
            <span>6-digit OTP</span>
            <input class="otp-input" name="otp" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000" required />
          </label>
          <div class="otp-meta">
            <span id="otp-countdown">05:00</span>
            <button class="link-button" id="resend-otp-button" type="button" disabled>Resend OTP</button>
          </div>
          <button class="button button--primary auth-submit" type="submit">Verify OTP</button>
          <a class="link-button link-button--anchor" href="../forgot-password/index.html">Use another account</a>
        </form>
        <footer class="auth-footer">AccessFlow · OTP verification</footer>
      </section>
    </main>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <script src="../../assets/js/env.js"></script>
    <script type="module" src="../../js/passwordReset.js?v=20260511"></script>
  </body>
</html>
