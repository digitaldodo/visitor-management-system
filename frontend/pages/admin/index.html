<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AccessFlow admin portal" />
    <title>AccessFlow | Admin Portal</title>
    <link rel="icon" href="../../assets/branding/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="../../css/admin/admin.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="portal-shell admin-shell" data-sidebar-state="expanded">
      <aside class="sidebar" aria-label="Admin navigation">
        <a class="brand logo-link" href="/admin/dashboard" aria-label="Admin portal home" data-default-admin-link>
          <img class="brand-logo brand-logo--full brand-logo--light" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
          <img class="brand-logo brand-logo--icon" src="../../assets/branding/logo-icon.png" alt="AccessFlow" />
        </a>
        <button class="icon-button sidebar__collapse" id="sidebar-collapse" type="button" aria-label="Collapse sidebar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 8 12l7 7 1.4-1.4L10.8 12l5.6-5.6Z"/></svg>
        </button>
        <p class="sidebar__tagline">Loading role-specific workspace.</p>

        <nav class="nav-list" id="sidebar-nav" aria-live="polite"></nav>

        <div class="sidebar__footer">
          <div class="sidebar__status">
            <span class="status-dot" id="api-status-dot" aria-hidden="true"></span>
            <span id="api-status-text">API checking</span>
          </div>
          <span class="sidebar__product">AccessFlow enterprise control plane</span>
        </div>
      </aside>

      <div class="shell-content">
        <header class="topbar">
          <button class="icon-button topbar__menu" id="sidebar-toggle" type="button" aria-label="Open navigation">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4Zm0 5h16v2H4Zm0 5h16v2H4Z"/></svg>
          </button>
          <a class="topbar__brand logo-link" href="/admin/dashboard" aria-label="Admin dashboard home" data-default-admin-link>
            <img class="brand-logo brand-logo--full brand-logo--dark" src="../../assets/branding/logo-light.png" alt="AccessFlow" />
            <img class="brand-logo brand-logo--icon" src="../../assets/branding/logo-icon.png" alt="AccessFlow" />
          </a>
          <div class="topbar__title">
            <p class="eyebrow">Access control</p>
            <h1>Administration Portal</h1>
            <p class="topbar__tagline">Smart. Secure. Seamless Visitor Management.</p>
          </div>
          <div class="topbar__actions">
            <span class="user-chip" id="user-chip">Signed in</span>
            <button class="button button--ghost" id="refresh-health" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.8-4.2L13 11h8V3Z"/></svg>
              <span>Refresh</span>
            </button>
            <button class="icon-button" id="logout-button" type="button" aria-label="Logout">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h8v2H7v14h6v2H5Zm10.6 4.4L20.2 12l-4.6 4.6-1.4-1.4 2.2-2.2H10v-2h6.4l-2.2-2.2Z"/></svg>
            </button>
          </div>
        </header>

        <main class="portal-main portal-main--workspace" id="main-content" tabindex="-1">
          <section class="workspace-shell" aria-label="Admin workspace">
            <header class="workspace-hero">
              <div class="workspace-hero__copy">
                <p class="eyebrow" id="workspace-eyebrow">Workspace</p>
                <h2 id="workspace-title">Administration</h2>
                <p class="workspace-description" id="workspace-description">Focused operational workspace.</p>
              </div>
              <div class="workspace-badges" id="workspace-badges" aria-label="Workspace scope"></div>
            </header>

            <section class="workspace-view" id="workspace-view" aria-live="polite"></section>
          </section>
        </main>
      </div>
    </div>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <div class="backdrop" id="sidebar-backdrop"></div>
    <script src="../../assets/js/env.js"></script>
    <script src="../../assets/js/boot.js"></script>
    <script type="module" src="../../js/admin/dashboard.js"></script>
  </body>
</html>
